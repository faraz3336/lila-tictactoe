services:
  - type: web
    name: lila-nakama-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lila-nakama-db
          property: connectionString
      - key: NAKAMA_SERVER_KEY
        sync: false
      - key: NAKAMA_RUNTIME_HTTP_KEY
        sync: false
      - key: NAKAMA_SESSION_ENCRYPTION_KEY
        sync: false
      - key: NAKAMA_REFRESH_ENCRYPTION_KEY
        sync: false
      - key: NAKAMA_CONSOLE_USERNAME
        value: admin
      - key: NAKAMA_CONSOLE_PASSWORD
        sync: false
      - key: NAKAMA_CONSOLE_SIGNING_KEY
        sync: false

databases:
  - name: lila-nakama-db
    plan: free
    region: singapore
